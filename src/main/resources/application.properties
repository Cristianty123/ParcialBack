spring.application.name=LabBack

# Configuración de PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/lab_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Permitir que el servidor escuche en todas las interfaces de red (Wifi, Ethernet, etc.)
server.address=0.0.0.0

server.port=8080

# Desactivamos el auto-creado de Hibernate (importante)
spring.jpa.hibernate.ddl-auto=none

# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#Ver las consultas SQL en la consola (muy útil para depurar Flyway)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Activamos Flyway
spring.flyway.enabled=true
# Esto permite que Flyway limpie la base de datos si es necesario (opcional para desarrollo)
spring.flyway.baseline-on-migrate=true

# Seguridad
spring.security.filter.dispatcher-types=REQUEST, ASYNC, ERROR

